name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: "Skip kagent deploy (build & push only)"
        required: false
        default: false
        type: boolean

env:
  GCP_PROJECT: ai-agent-labs-oslo-26-team-6
  GCP_REGION: europe-north1
  IMAGE: europe-north1-docker.pkg.dev/ai-agent-labs-oslo-26-team-6/aura/aura

jobs:
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          # Preferred: Workload Identity Federation (no long-lived key)
          # workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          # service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          # Fallback: Service Account JSON key
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push Docker image
        run: |
          docker build \
            --target runtime \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  deploy:
    name: Deploy via Kagent
    runs-on: ubuntu-latest
    needs: build-push
    if: ${{ github.event.inputs.skip_deploy != 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Install kagent CLI
        run: |
          curl -sSL https://github.com/kagent-dev/kagent/releases/latest/download/kagent-linux-amd64 \
            -o /usr/local/bin/kagent
          chmod +x /usr/local/bin/kagent

      - name: Substitute image tag in kagent.yaml
        run: |
          sed -i "s|IMAGE_TAG_PLACEHOLDER|${{ github.sha }}|g" kagent.yaml

      - name: Apply Agent CRDs
        run: kagent apply -f kagent.yaml
